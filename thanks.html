<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent - Fun Small Talk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", sans-serif; background: #FAF8F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 28px; }
    .card { background: #fff; border-radius: 24px; padding: 60px 48px; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
    .icon { font-size: 52px; margin-bottom: 20px; }
    h1 { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 12px; color: #1A1A1A; }
    p { font-size: 16px; color: #4B5563; line-height: 1.7; margin-bottom: 32px; }
    a { display: inline-block; background: #EB6D56; color: #fff; padding: 14px 32px; border-radius: 100px; font-weight: 700; font-size: 15px; text-decoration: none; }
    a:hover { background: #c95a43; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Message received!</h1>
    <p>Thanks for reaching out. I'll get back to you within 24 hours at the email you provided.</p>
    <a href="index.html">Back to Fun Small Talk</a>
  </div>
</body>
</html>
